services:
  db:
    image: postgres:17-alpine
    container_name: knowledge-cloud-db
    environment:
      POSTGRES_USER: knowledge
      POSTGRES_PASSWORD: knowledge
      POSTGRES_DB: knowledge_cloud
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge -d knowledge_cloud"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
